name: 🔄 KataBump Auto Renew

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * *"  # 每天 UTC 02:30

jobs:
  pre-check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: 4-day cycle check
        id: check
        run: |
          DAYS=$(( $(date -u +%s) / 86400 ))
          REMAINDER=$(( $DAYS % 4 ))
          if [ $REMAINDER -eq 0 ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "⏭️ 不在4天周期内，跳过"
          fi

  renew:
    needs: pre-check
    if: needs.pre-check.outputs.should_run != 'false'
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    env:
      ACCOUNTS: ${{ secrets.ACCOUNTS }}
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      HTTP_PROXY: ${{ secrets.HTTP_PROXY }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update -qq
          sudo apt-get install -y xvfb libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2

      - name: 🔍 Get Chrome version
        id: get_version
        run: |
          CHROME_VERSION=$(chromium-browser --version 2>/dev/null | grep -oE '[0-9]+' | head -1)
          if [ -z "$CHROME_VERSION" ]; then
            CHROME_VERSION=$(google-chrome --version 2>/dev/null | grep -oE '[0-9]+' | head -1)
          fi
          : "${CHROME_VERSION:=136}"
          echo "Detected: $CHROME_VERSION"
          echo "CHROME_VERSION=$CHROME_VERSION" >> $GITHUB_ENV

      - name: 🔌 Start Hysteria2 proxy
        if: env.HY2_AUTH != ''
        run: |
          curl -L -o hysteria \
            https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64
          chmod +x hysteria && sudo mv hysteria /usr/local/bin/
          printf 'server: %s\nauth: %s\ntls:\n  sni: %s\n  insecure: true\n  alpn:\n    - h3\nsocks5:\n  listen: 127.0.0.1:51080\n' \
            "${HY2_SERVER}" "${HY2_AUTH}" "${HY2_SNI}" > /tmp/hy2.yaml
          nohup hysteria client -c /tmp/hy2.yaml > /tmp/hy2.log 2>&1 &
          sleep 5
          curl -x socks5h://127.0.0.1:51080 -s --connect-timeout 10 https://api.ipify.org && echo " ✅代理OK" || echo "❌代理失败"
        env:
          HY2_SERVER: ${{ secrets.HY2_SERVER }}
          HY2_AUTH: ${{ secrets.HY2_AUTH }}
          HY2_SNI: ${{ secrets.HY2_SNI }}

      - name: 🖥️ Start Xvfb
        run: Xvfb :99 -ac &

      - name: ⏳ Random delay
        run: sleep $((RANDOM % 120))

      - name: 🚀 Run Renew
        env:
          DISPLAY: ':99'
          HEADLESS: 'false'
          CHROME_VERSION: ${{ env.CHROME_VERSION }}
        run: python renew_katabump.py

      - name: 📸 Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: katabump-screenshots
          path: "error-*.png"
          retention-days: 7
          if-no-files-found: warn

      - name: ⏱️ Commit time.txt
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          git add time.txt 2>/dev/null || true
          git diff --cached --quiet || {
            git commit -m "⏱️ $(date +'%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main
            git push origin HEAD:main
          }
