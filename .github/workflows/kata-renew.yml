name: 🔄 KataBump Auto Renew

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * *"

permissions:
  contents: write

concurrency:
  group: kata-renew
  cancel-in-progress: false

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 检出仓库
        uses: actions/checkout@v4

      - name: 🟢 设置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb google-chrome-stable fonts-noto-cjk xdotool

      - name: 📚 安装 Node.js 依赖
        run: npm install

      - name: 📡 安装 Hysteria2
        if: env.HY2_AUTH != ''
        run: |
          curl -L -o hysteria \
            https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64
          chmod +x hysteria
          sudo mv hysteria /usr/local/bin/
          hysteria version

      - name: 🔌 启动 Hysteria2 代理
        if: env.HY2_AUTH != ''
        run: |
          cat > /tmp/hy2.yaml << YAML
          server: ${HY2_SERVER}
          auth: ${HY2_AUTH}
          tls:
            sni: ${HY2_SNI}
            insecure: true
            alpn:
              - h3
          socks5:
            listen: 127.0.0.1:51080
          YAML
          nohup hysteria client -c /tmp/hy2.yaml > /tmp/hy2.log 2>&1 &
          sleep 3
          # 验证代理
          curl -x socks5h://127.0.0.1:51080 -s https://api.ipify.org && echo "" || echo "代理连接失败"
        env:
          HY2_SERVER: ${{ secrets.HY2_SERVER }}
          HY2_AUTH: ${{ secrets.HY2_AUTH }}
          HY2_SNI: ${{ secrets.HY2_SNI }}

      - name: ⏳ 随机延迟
        run: sleep $((RANDOM % 120))

      - name: 🚀 执行续期
        env:
          USERS_JSON: ${{ secrets.USERS_JSON }}
          HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node action_renew.js

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: katabump-screenshots
          path: screenshots/
          retention-days: 7
          if-no-files-found: warn

      - name: ⏱️ 提交时间文件
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          git add time.txt 2>/dev/null || true
          git diff --cached --quiet || {
            git commit -m "⏱️ $(date +'%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main
            git push origin HEAD:main
          }
